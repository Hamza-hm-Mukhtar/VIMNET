train_shard_dir: data/processed/highd/train
val_shard_dir: data/processed/highd/val
test_shard_dir: data/processed/highd/test
out_dir: runs/finetune_highd

pretrained_ckpt: runs/pretrain/best_pretrain.pt

seed: 1
device: cuda
num_workers: 4

obs_len: 20
pred_len: 50
batch_size: 64

lr_encoder: 0.0002
lr_heads: 0.0005
weight_decay: 0.01
grad_clip: 1.0
epochs: 60
warmup_frac: 0.05
early_stop_patience: 8

# Multi-task
train_tp: true
train_lc: true
lambda_lc: 0.5
label_smoothing: 0.05

# Scheduled sampling (GRU head)
max_free_running_ratio: 0.2
free_running_warmup_frac: 0.3

# Ablation knobs
context_pool: last         # last | mean
use_temporal_gru_adapter: false   # GSAN-style temporal modeling
trajectory_head: gru       # gru | mlp | transformer

freeze_encoder: false

model_yaml: configs/model/vimnet_base.yaml
