# VIMNET-NoActPas: symmetric, undirected edges (no active/passive).
num_slots: 9
dim: 256
depth: 6
num_heads: 8
dropout: 0.1
attn_dropout: 0.1
ffn_mult: 4
stochastic_depth: 0.05

enable_spatial: true
enable_temporal: true

use_distance_bias: true
use_type_bias: true
use_actpas_bias: false
fixed_spatial_weights: false

use_slot_type_embeddings: true
use_role_embeddings: true
